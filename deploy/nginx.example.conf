# 火柴 · 生产反代示例（密钥只在服务器）
# 用法：按需改 root / server_name / 环境变量注入方式

server {
    listen 443 ssl http2;
    server_name match.example.com;

    root /var/www/match/dist;
    index index.html;

    # 首页
    location = / {
        try_files /index.html =404;
    }

    # 显式 404 页（白底阴燃火柴）
    location = /404.html {
        try_files /404.html =404;
        add_header Cache-Control "no-cache";
    }

    # 静态资源 / 已知文件；缺失则 404 页
    # 本项目无前端路由，不需要 SPA fallback 到 index.html
    location / {
        try_files $uri $uri/ /404.html;
    }

    error_page 404 /404.html;

    # 高德：注入 key，浏览器不可见
    location /api/amap/ {
        proxy_pass https://restapi.amap.com/;
        proxy_set_header Host restapi.amap.com;
        # 用 OpenResty / lua / auth_request 更佳；示意：
        # 若使用 query 注入，请在网关层重写，切勿写进前端包
        proxy_ssl_server_name on;
    }

    # 和风：注入 key；Host 按控制台 API Host 修改
    location /api/qweather/ {
        proxy_pass https://devapi.qweather.com/;
        proxy_set_header Host devapi.qweather.com;
        # rewrite 或 auth 注入 ?key=${QWEATHER_KEY}
        proxy_ssl_server_name on;
    }

    # 彩云：把路径改写为 /v2.5/{TOKEN}/...
    location /api/caiyun/ {
        # 示例需要 OpenResty 或独立 BFF；纯 nginx 可用:
        # rewrite ^/api/caiyun/(.*)$ /v2.5/${CAIYUN_TOKEN}/$1 break;
        proxy_pass https://api.caiyunapp.com/;
        proxy_ssl_server_name on;
    }

    # WAQI
    location /api/waqi/ {
        proxy_pass https://api.waqi.info/;
        proxy_ssl_server_name on;
    }

    # 静态缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 不缓存 SW
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
